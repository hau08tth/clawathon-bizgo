server {
    listen 8080;
    server_name _;

    # Health check — nginx answers immediately so AgentBase marks runtime ACTIVE fast
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        # Fallback: if backend not ready yet, return 200 so container starts
        proxy_intercept_errors on;
        error_page 502 503 504 = @health_fallback;
    }
    location @health_fallback {
        return 200 "starting\n";
        add_header Content-Type text/plain;
    }

    # BizShare generate-content — 1 LLM call but large token count
    location = /bizshare/generate-content {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # BizCoCreate needs longer timeout — 3 sequential LLM calls
    location ~ ^/bizcocreate {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Backend API routes
    location ~ ^/(auth|bizshare|bizconnect|gamification|community|teams|docs|openapi.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
